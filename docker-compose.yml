version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sindiwallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sindiwallet
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/sindiwallet
      APP_ENV: development
      PORT: 3000
      WEB_ADMIN_URL: http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    ports:
      - '8000:8000'
    environment:
      APP_ENV: local
      APP_KEY: base64:GENERATE_A_REAL_KEY_HERE
      API_URL: http://api:3000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: sindiwallet
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
